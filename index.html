<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Tracker</title>
  <style>
    :root {
      --primary: #ff2d95;
      --accent: #00f5ff;
      --bg: #0f0f1a;
      --card: #1a1a2e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: #eee;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      color: var(--primary);
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px rgba(255,45,149,0.3);
    }
    .stats {
      display: flex;
      justify-content: space-around;
      background: var(--card);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 25px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .stat-item { text-align: center; }
    .stat-number { font-size: 28px; font-weight: bold; color: var(--accent); }
    .stat-label { font-size: 13px; color: #aaa; }

    .stock-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      border-left: 6px solid;
    }
    .high { border-color: #00ff9d; }
    .medium { border-color: #ffaa00; }
    .low { border-color: #888; }

    .stock-name { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
    button {
      width: 100%;
      padding: 18px;
      margin: 12px 0;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: bold;
    }
    textarea {
      width: 100%;
      padding: 16px;
      background: #16213e;
      border: none;
      border-radius: 16px;
      color: #eee;
      font-size: 16px;
      min-height: 180px;
    }
  </style>
</head>
<body>
  <h1>SOP Tracker</h1>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-number" id="totalScans">0</div>
      <div class="stat-label">總掃描</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="greenRate">0%</div>
      <div class="stat-label">綠燈比例</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="avgScore">0</div>
      <div class="stat-label">平均總分</div>
    </div>
  </div>

  <div class="card">
    <label>貼入 Grok 的分析文字</label>
    <textarea id="inputText" placeholder="直接貼 Grok 給你的整段文字..."></textarea>
  </div>

  <button onclick="parseAndSplit()">🤖 分拆成個股卡片</button>
  <button onclick="exportJSON()">📤 匯出全部 JSON</button>

  <div id="result"></div>

  <script>
    function getColorClass(potential) {
      if (potential.includes('高') || potential.includes('★★★')) return 'high';
      if (potential.includes('中')) return 'medium';
      return 'low';
    }

    function isGreen(score) {
      return parseInt(score) >= 15;
    }

    function parseAndSplit() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      const time = new Date().toLocaleString('zh-TW');
      const lines = text.split('\n');
      let cardsHTML = '';
      let greenCount = 0;
      let totalScoreSum = 0;
      let count = 0;

      lines.forEach(line => {
        line = line.trim();
        if (/^\d+\s+[A-Z]+/.test(line)) {
          const parts = line.split(/\s+/).filter(p => p);
          if (parts.length >= 4) {
            const rank = parts[0];
            const stock = parts[1];
            const change = parts[2];
            const aScore = parts[3];
            const totalScore = parts[4] || '0';
            const issue = parts.slice(5).join(' ');

            const potential = issue.includes('高') ? '★★★ 高' : issue.includes('中') ? '★★ 中' : '★ 低';
            const colorClass = getColorClass(potential);
            const green = isGreen(totalScore) ? '✅ 綠燈' : '⚪️ 非綠燈';

            if (isGreen(totalScore)) greenCount++;
            totalScoreSum += parseInt(totalScore) || 0;
            count++;

            cardsHTML += `
              <div class="stock-card ${colorClass}">
                <div class="stock-name">${rank}. ${stock}</div>
                <div class="info">漲幅: <strong>${change}</strong></div>
                <div class="info">A級: ${aScore} | 總分: <strong>${totalScore}</strong></div>
                <div class="info">問題: ${issue}</div>
                <div class="info">潛力: <strong>${potential}</strong></div>
                <div style="margin-top:8px;">${green}</div>
              </div>`;
          }
        }
      });

      document.getElementById('result').innerHTML = cardsHTML || '<p>未能解析到個股，請檢查格式</p>';

      // 更新統計
      document.getElementById('totalScans').textContent = count || '—';
      document.getElementById('greenRate').textContent = count ? Math.round((greenCount / count) * 100) + '%' : '0%';
      document.getElementById('avgScore').textContent = count ? (totalScoreSum / count).toFixed(1) : '0';
    }

    function exportJSON() {
      const records = JSON.parse(localStorage.getItem('sopV12') || '[]');
      const blob = new Blob([JSON.stringify(records, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SOP-Records-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    // 自動暫存
    document.getElementById('inputText').addEventListener('input', () => {
      localStorage.setItem('tempInput', document.getElementById('inputText').value);
    });

    window.onload = () => {
      const saved = localStorage.getItem('tempInput');
      if (saved) document.getElementById('inputText').value = saved;
    };
  </script>
</body>
</html>
