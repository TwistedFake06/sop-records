<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 快速記錄 v5</title>
  <style>
    :root {
      --primary: #00ff88;
      --bg: #0a0a0a;
      --card: #1a1a1a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: #eee;
      line-height: 1.6;
    }
    h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 30px;
      font-size: 28px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    input, textarea {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: #222;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
    }
    .history-item {
      background: #222;
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
    }
    .time { color: #00ff88; font-size: 14px; }
    pre {
      background: #111;
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>🔥 SOP 快速記錄 v5</h1>

  <div class="card">
    <label>日期時間</label>
    <input type="text" id="time" readonly>

    <label>本次掃描記錄（可多隻股票）</label>
    <textarea id="content" rows="8" placeholder="例如：
TSLA 總分 17 → No (J過熱)
MU 總分 16 → No (KDJ過熱)
AMD 總分 15 → 觀望"></textarea>

    <button onclick="saveAndUpload()">💾 儲存並自動上傳 GitHub</button>
  </div>

  <div class="card">
    <h2>歷史紀錄</h2>
    <div id="history"></div>
  </div>

  <div class="card">
    <h2>最新 JSON 預覽</h2>
    <pre id="jsonPreview"></pre>
  </div>

  <script>
    const OWNER = "TwistedFake06";
    const REPO = "sop-records";
    let PAT = "";

    // 自動填時間
    document.getElementById('time').value = new Date().toLocaleString('zh-TW');

    async function saveAndUpload() {
      const content = document.getElementById('content').value.trim();
      if (!content) return alert("請輸入分析內容");

      PAT = prompt("請輸入你的 GitHub Personal Access Token (只輸入一次):", PAT);
      if (!PAT) return alert("需要 Token 才能上傳");

      const record = {
        time: new Date().toLocaleString('zh-TW'),
        content: content
      };

      let records = [];
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/sop_records.json`;

      try {
        const res = await fetch(url, { headers: { Authorization: `token ${PAT}` } });
        if (res.ok) {
          const data = await res.json();
          records = JSON.parse(atob(data.content));
        }
      } catch(e) {}

      records.unshift(record);

      const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(records, null, 2))));

      const body = {
        message: `Update SOP records - ${new Date().toLocaleString('zh-TW')}`,
        content: newContent,
        sha: (await fetch(url, { headers: { Authorization: `token ${PAT}` } }).then(r => r.json()).catch(() => ({}))).sha
      };

      const upload = await fetch(url, {
        method: 'PUT',
        headers: {
          Authorization: `token ${PAT}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (upload.ok) {
        alert('✅ 已成功儲存並自動上傳到 GitHub！');
        document.getElementById('content').value = '';
        loadHistory();
      } else {
        alert('❌ 上傳失敗，請檢查 Token 是否正確');
      }
    }

    function loadHistory() {
      // 本地顯示歷史
      const div = document.getElementById('history');
      const records = JSON.parse(localStorage.getItem('localSOP') || '[]');
      let html = '';
      records.forEach(r => {
        html += `<div class="history-item">
          <div class="time">${r.time}</div>
          <div>${r.content.replace(/\n/g, '<br>')}</div>
        </div>`;
      });
      div.innerHTML = html || '<p>還沒有紀錄</p>';
    }

    window.onload = loadHistory;
  </script>
</body>
</html>
