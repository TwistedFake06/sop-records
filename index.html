<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 智能卡片 v7</title>
  <style>
    body {font-family: system-ui; margin:0; padding:20px; background:#111; color:#eee;}
    h1 {text-align:center; color:#0f0;}
    .card {background:#1f1f1f; border-radius:16px; padding:20px; margin:15px 0;}
    textarea, button {width:100%; padding:15px; margin:10px 0; border-radius:12px; font-size:17px;}
    button {background:#00ff9d; color:#000; font-weight:bold;}
    .stock-card {background:#222; padding:15px; margin:10px 0; border-radius:12px;}
    pre {background:#0a0a0a; padding:15px; border-radius:10px; overflow:auto;}
  </style>
</head>
<body>
  <h1>🔥 SOP 智能卡片 v7</h1>

  <div class="card">
    <label>貼入 Grok 的分析文字</label>
    <textarea id="inputText" rows="12" placeholder="直接貼 Grok 給你的整段分析..."></textarea>
    <button onclick="parseAndSave()">🤖 智能解析並儲存為卡片</button>
  </div>

  <div class="card">
    <h2>歷史卡片記錄</h2>
    <div id="history"></div>
  </div>

  <script>
    function parseAndSave() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      const time = new Date().toLocaleString('zh-TW');

      // 智能提取表格行
      const lines = text.split('\n');
      let parsed = [];
      let currentStock = {};

      lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        // 提取股票 + 分數 + 結論
        const stockMatch = line.match(/(\d+)\s+([A-Z]+)\s+([+|-]\d+\.\d+%)/);
        if (stockMatch) {
          currentStock = {
            rank: stockMatch[1],
            stock: stockMatch[2],
            change: stockMatch[3]
          };
        } else if (line.includes('總分')) {
          const scoreMatch = line.match(/總分估計\s*(\d+–\d+|\d+)/);
          if (scoreMatch && currentStock.stock) {
            parsed.push({
              stock: currentStock.stock,
              change: currentStock.change,
              score: scoreMatch[1],
              note: line
            });
            currentStock = {};
          }
        }
      });

      const entry = {
        time: time,
        raw: text,
        parsed: parsed.length ? parsed : [{note: text}]
      };

      let records = JSON.parse(localStorage.getItem('sopV7') || '[]');
      records.unshift(entry);
      localStorage.setItem('sopV7', JSON.stringify(records));

      alert('✅ 已解析並儲存為卡片！');
      document.getElementById('inputText').value = '';
      renderHistory();
    }

    function renderHistory() {
      const div = document.getElementById('history');
      const records = JSON.parse(localStorage.getItem('sopV7') || '[]');
      let html = '';
      records.forEach(r => {
        let stocksHTML = '';
        if (r.parsed && r.parsed.length > 0) {
          r.parsed.forEach(s => {
            stocksHTML += `
              <div class="stock-card">
                <strong>${s.stock || ''}</strong> ${s.change || ''} 
                <span style="color:#0f0">總分 ${s.score || ''}</span><br>
                ${s.note || ''}
              </div>`;
          });
        } else {
          stocksHTML = `<pre>${r.raw}</pre>`;
        }

        html += `
          <div class="card">
            <strong>${r.time}</strong>
            ${stocksHTML}
          </div>`;
      });
      div.innerHTML = html || '<p>還沒有紀錄</p>';
    }

    window.onload = renderHistory;
  </script>
</body>
</html>
