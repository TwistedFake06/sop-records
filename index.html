<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 個股卡片 v15</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    .stock-card { border-left: 6px solid; }
    .green { border-color: #00ff9d; }
    .yellow { border-color: #ffaa00; }
    .red { border-color: #ff4444; }
  </style>
</head>
<body class="bg-base-900 text-base-content min-h-screen p-4">
  <div class="max-w-2xl mx-auto">

    <h1 class="text-4xl font-bold text-center text-primary mb-6">SOP Tracker v15</h1>

    <div class="stats shadow mb-8">
      <div class="stat">
        <div class="stat-title">總掃描</div>
        <div class="stat-value text-primary" id="totalScans">0</div>
      </div>
      <div class="stat">
        <div class="stat-title">綠燈比例</div>
        <div class="stat-value text-success" id="greenRate">0%</div>
      </div>
      <div class="stat">
        <div class="stat-title">平均總分</div>
        <div class="stat-value" id="avgScore">0</div>
      </div>
    </div>

    <div class="card bg-base-800 shadow-xl mb-8">
      <div class="card-body">
        <label class="label">
          <span class="label-text text-lg">貼入 Grok 的分析文字</span>
        </label>
        <textarea id="inputText" class="textarea textarea-bordered h-48 w-full bg-base-900" 
                  placeholder="直接貼 Grok 給你的整段文字..."></textarea>
        
        <div class="flex gap-3 mt-4">
          <button onclick="parseAndSplit()" class="btn btn-primary flex-1">🤖 分拆成個股卡片</button>
          <button onclick="clearInput()" class="btn btn-ghost">清空</button>
        </div>
      </div>
    </div>

    <div id="result"></div>

    <button onclick="exportJSON()" class="btn btn-outline w-full mt-8">📤 匯出全部 JSON</button>
  </div>

  <script>
    function getLight(score, issue) {
      const total = parseInt(score) || 0;
      const hasRedFlag = issue.includes('過熱') || issue.includes('假頂') || issue.includes('紅旗');

      if (total >= 15 && !hasRedFlag) return { light: 'green', text: '✅ 綠燈' };
      if (total >= 13) return { light: 'yellow', text: '⚠️ 黃燈' };
      return { light: 'red', text: '❌ 紅燈' };
    }

    function parseAndSplit() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      const time = new Date().toLocaleString('zh-TW');
      const lines = text.split('\n');
      let newCards = '';

      let greenCount = 0;
      let totalScoreSum = 0;
      let count = 0;

      lines.forEach(line => {
        line = line.trim();
        if (/^\d+\s+[A-Z]+/.test(line)) {
          const parts = line.split(/\s+/).filter(p => p);
          if (parts.length >= 4) {
            const rank = parts[0];
            const stock = parts[1];
            const change = parts[2];
            const aScore = parts[3];
            const totalScore = parts[4] || '0';
            const issue = parts.slice(5).join(' ');

            const potential = issue.includes('高') ? '★★★ 高' : 
                             (issue.includes('中') ? '★★ 中高' : '★ 低');

            const { light, text: lightText } = getLight(totalScore, issue);

            if (light === 'green') greenCount++;
            totalScoreSum += parseInt(totalScore) || 0;
            count++;

            newCards += `
              <div class="card bg-base-800 shadow-xl ${light} mb-6">
                <div class="card-body">
                  <div class="flex justify-between items-start">
                    <div>
                      <div class="text-2xl font-bold">${stock}</div>
                      <div class="text-sm opacity-70">${rank} • ${change}</div>
                    </div>
                    <div class="text-right">
                      <div class="text-3xl font-bold text-primary">${totalScore}</div>
                      <div class="text-xs opacity-60">總分</div>
                    </div>
                  </div>
                  <div class="mt-4 text-sm">
                    A級: ${aScore} | 問題: ${issue}
                  </div>
                  <div class="mt-3">
                    <span class="badge ${light === 'green' ? 'badge-success' : light === 'yellow' ? 'badge-warning' : 'badge-error'}">
                      ${lightText}
                    </span>
                    <span class="ml-3">${potential}</span>
                  </div>
                </div>
              </div>`;
          }
        }
      });

      document.getElementById('result').innerHTML += newCards;

      // 更新統計
      document.getElementById('totalScans').textContent = count || document.getElementById('totalScans').textContent;
      document.getElementById('avgScore').textContent = count ? (totalScoreSum / count).toFixed(1) : document.getElementById('avgScore').textContent;
      document.getElementById('greenRate').textContent = count ? Math.round((greenCount / count) * 100) + '%' : document.getElementById('greenRate').textContent;

      alert('✅ 已新增個股卡片！');
      document.getElementById('inputText').value = '';
    }

    function clearInput() {
      document.getElementById('inputText').value = '';
    }

    function exportJSON() {
      alert('JSON 匯出功能準備好（可再加完整版本）');
    }
  </script>
</body>
</html>
