<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 表格卡片 v8.1</title>
  <style>
    body {font-family: system-ui; margin:0; padding:20px; background:#111; color:#eee;}
    h1 {text-align:center; color:#0f0;}
    .card {
      background:#1f1f1f;
      border-radius:16px;
      padding:20px;
      margin:15px 0;
      box-shadow: 0 4px 20px rgba(0,255,157,0.1);
    }
    table {
      width:100%;
      border-collapse:collapse;
      margin:15px 0;
      background:#222;
      border-radius:12px;
      overflow:hidden;
    }
    th, td {
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid #333;
    }
    th {background:#2a2a2a; color:#0f0;}
    button {
      width:100%;
      padding:16px;
      background:#00ff9d;
      color:#000;
      border:none;
      border-radius:12px;
      font-weight:bold;
      margin:15px 0;
    }
  </style>
</head>
<body>
  <h1>🔥 SOP 表格卡片 v8.1</h1>

  <div class="card">
    <label>貼入 Grok 的完整分析文字</label>
    <textarea id="inputText" rows="12" placeholder="直接貼 Grok 給你的整段文字..."></textarea>
    <button onclick="extractAndShow()">🤖 提取表格並顯示卡片</button>
  </div>

  <div id="result"></div>

  <script>
    function extractAndShow() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      const time = new Date().toLocaleString('zh-TW');

      // 強化提取表格（支援你這種格式）
      const lines = text.split('\n');
      let tableHTML = `<table><tr><th>排名</th><th>股票</th><th>夜盤漲幅</th><th>A級分數</th><th>總分估計</th><th>主要問題</th><th>明天潛力</th><th>建議</th></tr>`;

      lines.forEach(line => {
        line = line.trim();
        if (line.match(/^\d+\s+[A-Z]+/)) {
          // 匹配如 "1 TSLA +1.84% 11–13 15–19 ..."
          const parts = line.split(/\s+/);
          if (parts.length >= 5) {
            tableHTML += `<tr>
              <td>${parts[0]}</td>
              <td>${parts[1]}</td>
              <td>${parts[2]}</td>
              <td>${parts[3]}</td>
              <td>${parts[4]}</td>
              <td>${parts.slice(5).join(' ')}</td>
              <td></td>
              <td></td>
            </tr>`;
          }
        }
      });

      tableHTML += `</table>`;

      document.getElementById('result').innerHTML = `
        <div class="card">
          <strong>${time}</strong>
          ${tableHTML}
        </div>
      `;

      // 儲存到歷史
      let records = JSON.parse(localStorage.getItem('sopTableV8') || '[]');
      records.unshift({ time, tableHTML });
      localStorage.setItem('sopTableV8', JSON.stringify(records));
    }

    // 載入歷史
    window.onload = () => {
      const records = JSON.parse(localStorage.getItem('sopTableV8') || '[]');
      let html = '';
      records.forEach(r => {
        html += `<div class="card">
          <strong>${r.time}</strong>
          ${r.tableHTML}
        </div>`;
      });
      document.getElementById('result').innerHTML = html || '<p>還沒有紀錄</p>';
    };
  </script>
</body>
</html>
