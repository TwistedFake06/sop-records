<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui; }
  </style>
</head>
<body class="bg-base-900 text-base-content min-h-screen">
  <div class="max-w-2xl mx-auto p-4">

    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-primary">SOP Tracker</h1>
      <p class="text-base-content/60">v5.9 個股智能記錄</p>
    </div>

    <!-- 統計面板 -->
    <div class="stats shadow mb-8">
      <div class="stat">
        <div class="stat-title">總掃描</div>
        <div class="stat-value text-primary" id="totalScans">0</div>
      </div>
      <div class="stat">
        <div class="stat-title">綠燈比例</div>
        <div class="stat-value text-success" id="greenRate">0%</div>
      </div>
      <div class="stat">
        <div class="stat-title">平均總分</div>
        <div class="stat-value" id="avgScore">0</div>
      </div>
    </div>

    <!-- 輸入區 -->
    <div class="card bg-base-800 shadow-xl mb-8">
      <div class="card-body">
        <label class="label">
          <span class="label-text text-lg">貼入 Grok 的分析文字</span>
        </label>
        <textarea id="inputText" class="textarea textarea-bordered h-48 w-full bg-base-900" 
                  placeholder="直接貼 Grok 給你的整段文字..."></textarea>
        
        <div class="flex gap-3 mt-4">
          <button onclick="parseAndSplit()" class="btn btn-primary flex-1">🤖 分拆成個股卡片</button>
          <button onclick="clearInput()" class="btn btn-ghost">清空</button>
        </div>
      </div>
    </div>

    <!-- 結果區 -->
    <div id="result"></div>

    <button onclick="exportJSON()" class="btn btn-outline w-full mt-6">📤 匯出全部 JSON</button>
  </div>

  <script>
    function getColorClass(potential) {
      if (potential.includes('高') || potential.includes('★★★')) return 'border-l-4 border-success';
      if (potential.includes('中')) return 'border-l-4 border-warning';
      return 'border-l-4 border-base-500';
    }

    function isGreenLight(score) {
      return parseInt(score) >= 15;
    }

    function parseAndSplit() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      const time = new Date().toLocaleString('zh-TW');
      const lines = text.split('\n');
      let cardsHTML = '';
      let greenCount = 0;
      let totalScoreSum = 0;
      let count = 0;

      lines.forEach(line => {
        line = line.trim();
        if (/^\d+\s+[A-Z]+/.test(line)) {
          const parts = line.split(/\s+/).filter(p => p);
          if (parts.length >= 4) {
            const rank = parts[0];
            const stock = parts[1];
            const change = parts[2];
            const aScore = parts[3];
            const totalScore = parts[4] || '0';
            const issue = parts.slice(5).join(' ');

            const potential = issue.includes('高') ? '★★★ 高' : 
                             (issue.includes('中') ? '★★ 中高' : '★ 低');

            const colorClass = getColorClass(potential);
            const isGreen = isGreenLight(totalScore);

            if (isGreen) greenCount++;
            totalScoreSum += parseInt(totalScore) || 0;
            count++;

            cardsHTML += `
              <div class="card bg-base-800 shadow-xl ${colorClass} mb-6">
                <div class="card-body">
                  <div class="flex justify-between items-start">
                    <div>
                      <div class="text-2xl font-bold">${stock}</div>
                      <div class="text-sm opacity-70">${rank} • 夜盤 ${change}</div>
                    </div>
                    <div class="text-right">
                      <div class="text-3xl font-bold text-primary">${totalScore}</div>
                      <div class="text-xs opacity-60">總分</div>
                    </div>
                  </div>
                  <div class="mt-4 text-sm">
                    <span class="opacity-70">A級：</span>${aScore}　|　
                    <span class="opacity-70">問題：</span>${issue}
                  </div>
                  <div class="mt-3">
                    <span class="badge ${isGreen ? 'badge-success' : 'badge-neutral'}">${potential}</span>
                    ${isGreen ? '<span class="ml-2 text-success text-sm">✅ 綠燈</span>' : ''}
                  </div>
                </div>
              </div>`;
          }
        }
      });

      document.getElementById('result').innerHTML = cardsHTML || '<div class="alert alert-warning">未能解析到個股資料</div>';

      // 更新統計
      const avg = count ? (totalScoreSum / count).toFixed(1) : 0;
      const greenRate = count ? Math.round((greenCount / count) * 100) : 0;

      document.getElementById('totalScans').textContent = count;
      document.getElementById('greenRate').textContent = greenRate + '%';
      document.getElementById('avgScore').textContent = avg;

      // 儲存
      let records = JSON.parse(localStorage.getItem('sopV13') || '[]');
      records.unshift({ time, html: cardsHTML });
      localStorage.setItem('sopV13', JSON.stringify(records));
    }

    function clearInput() {
      document.getElementById('inputText').value = '';
    }

    function exportJSON() {
      const records = JSON.parse(localStorage.getItem('sopV13') || '[]');
      const blob = new Blob([JSON.stringify(records, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SOP-Records-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    // 自動暫存
    document.getElementById('inputText').addEventListener('input', () => {
      localStorage.setItem('tempInput', document.getElementById('inputText').value);
    });

    window.onload = () => {
      const saved = localStorage.getItem('tempInput');
      if (saved) document.getElementById('inputText').value = saved;
    };
  </script>
</body>
</html>
