<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 表格卡片 v8</title>
  <style>
    body {font-family: system-ui; margin:0; padding:20px; background:#111; color:#eee;}
    h1 {text-align:center; color:#0f0;}
    .card {
      background:#1f1f1f;
      border-radius:16px;
      padding:20px;
      margin:15px 0;
      box-shadow: 0 4px 20px rgba(0,255,157,0.15);
    }
    table {
      width:100%;
      border-collapse:collapse;
      margin:15px 0;
    }
    th, td {
      padding:12px;
      border:1px solid #333;
      text-align:left;
    }
    th {background:#2a2a2a;}
    button {
      width:100%;
      padding:16px;
      background:#00ff9d;
      color:#000;
      border:none;
      border-radius:12px;
      font-weight:bold;
      margin:10px 0;
    }
  </style>
</head>
<body>
  <h1>🔥 SOP 表格卡片 v8</h1>

  <div class="card">
    <label>貼入 Grok 的分析文字（含表格）</label>
    <textarea id="inputText" rows="10" placeholder="直接貼 Grok 給你的整段文字..."></textarea>
    <button onclick="parseAndShow()">🤖 提取表格並顯示卡片</button>
  </div>

  <div id="result"></div>

  <script>
    function parseAndShow() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      // 提取表格部分（找有 | 的行）
      const lines = text.split('\n');
      let tableHTML = '<table><tr>';

      let inTable = false;
      lines.forEach(line => {
        line = line.trim();
        if (line.includes('|')) {
          inTable = true;
          const cells = line.split('|').map(c => c.trim()).filter(c => c);
          if (cells.length > 1) {
            tableHTML += '<tr>';
            cells.forEach(cell => {
              tableHTML += `<td>${cell}</td>`;
            });
            tableHTML += '</tr>';
          }
        } else if (inTable && line === '') {
          inTable = false;
        }
      });

      tableHTML += '</table>';

      const time = new Date().toLocaleString('zh-TW');

      document.getElementById('result').innerHTML = `
        <div class="card">
          <strong>${time}</strong>
          ${tableHTML}
        </div>
      `;

      // 同時儲存到歷史
      let records = JSON.parse(localStorage.getItem('sopTableV8') || '[]');
      records.unshift({ time, tableHTML });
      localStorage.setItem('sopTableV8', JSON.stringify(records));
    }

    // 載入歷史
    window.onload = () => {
      const records = JSON.parse(localStorage.getItem('sopTableV8') || '[]');
      let html = '';
      records.forEach(r => {
        html += `<div class="card">
          <strong>${r.time}</strong>
          ${r.tableHTML}
        </div>`;
      });
      document.getElementById('result').innerHTML = html || '<p>還沒有紀錄</p>';
    };
  </script>
</body>
</html>
