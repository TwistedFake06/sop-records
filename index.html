<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 表格卡片 v10</title>
  <style>
    body {font-family: system-ui; margin:0; padding:20px; background:#111; color:#eee;}
    h1 {text-align:center; color:#0f0;}
    .card {
      background:#1f1f1f;
      border-radius:16px;
      padding:20px;
      margin:15px 0;
      box-shadow: 0 4px 20px rgba(0,255,157,0.1);
    }
    table {
      width:100%;
      border-collapse:collapse;
      margin:15px 0;
      background:#222;
      border-radius:12px;
      overflow:hidden;
    }
    th, td {
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid #333;
    }
    th {background:#2a2a2a; color:#0f0;}
    textarea, button {
      width:100%;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
      font-size:17px;
    }
    button {background:#00ff9d; color:#000; font-weight:bold;}
    .stats {
      display:flex;
      justify-content:space-around;
      background:#1a1a1a;
      padding:15px;
      border-radius:12px;
      margin:15px 0;
    }
  </style>
</head>
<body>
  <h1>🔥 SOP 表格卡片 v10</h1>

  <div class="card">
    <label>貼入 Grok 的分析文字</label>
    <textarea id="inputText" rows="12" placeholder="直接貼 Grok 給你的整段文字..."></textarea>
    <div style="color:#888; font-size:14px; margin-top:5px;">已自動暫存 • 刷新不會消失</div>
    <button onclick="extractAndShow()">🤖 提取表格並顯示卡片</button>
    <button onclick="clearInput()" style="background:#666;">🗑 清空輸入</button>
  </div>

  <div class="stats">
    <div>總掃描次數: <strong id="totalScans">0</strong></div>
    <div>平均總分: <strong id="avgScore">0</strong></div>
  </div>

  <div id="result"></div>

  <button onclick="exportJSON()" style="background:#00bfff;">📤 匯出全部 JSON</button>

  <script>
    // 自動暫存
    const textarea = document.getElementById('inputText');
    textarea.addEventListener('input', () => {
      localStorage.setItem('tempInputV10', textarea.value);
    });

    window.onload = () => {
      const saved = localStorage.getItem('tempInputV10');
      if (saved) textarea.value = saved;
      loadHistory();
    };

    function extractAndShow() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      const time = new Date().toLocaleString('zh-TW');

      // 強化表格提取
      const lines = text.split('\n');
      let tableHTML = `<table><tr><th>排名</th><th>股票</th><th>漲幅</th><th>A級</th><th>總分</th><th>問題</th><th>潛力</th><th>建議</th></tr>`;

      lines.forEach(line => {
        line = line.trim();
        if (/^\d+\s+[A-Z]+/.test(line)) {
          const parts = line.split(/\s+/).filter(p => p);
          if (parts.length >= 4) {
            tableHTML += `<tr>
              <td>${parts[0]}</td>
              <td>${parts[1]}</td>
              <td>${parts[2]}</td>
              <td>${parts[3] || ''}</td>
              <td>${parts[4] || ''}</td>
              <td>${parts.slice(5, -2).join(' ')}</td>
              <td>${parts[parts.length-2] || ''}</td>
              <td>${parts[parts.length-1] || ''}</td>
            </tr>`;
          }
        }
      });

      tableHTML += `</table>`;

      const cardHTML = `
        <div class="card">
          <strong>${time}</strong>
          ${tableHTML}
        </div>`;

      document.getElementById('result').innerHTML = cardHTML;

      // 儲存歷史
      let records = JSON.parse(localStorage.getItem('sopV10') || '[]');
      records.unshift({ time, tableHTML, raw: text });
      localStorage.setItem('sopV10', JSON.stringify(records));

      // 清空暫存
      localStorage.removeItem('tempInputV10');
      loadHistory();
    }

    function loadHistory() {
      const div = document.getElementById('result');
      const records = JSON.parse(localStorage.getItem('sopV10') || '[]');
      let html = '';
      records.forEach(r => {
        html += `<div class="card">
          <strong>${r.time}</strong>
          ${r.tableHTML}
        </div>`;
      });
      div.innerHTML = html || '<p>還沒有紀錄</p>';

      // 簡單統計
      document.getElementById('totalScans').textContent = records.length;
    }

    function clearInput() {
      document.getElementById('inputText').value = '';
      localStorage.removeItem('tempInputV10');
    }

    function exportJSON() {
      const records = JSON.parse(localStorage.getItem('sopV10') || '[]');
      const blob = new Blob([JSON.stringify(records, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SOP-Records-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }
  </script>
</body>
</html>
