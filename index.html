<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 股票記錄</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SOP 記錄">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180x180/0f0/000?text=SOP"> <!-- 可換你自己 icon -->

  <style>
    body {font-family: system-ui; margin:0; padding:20px; background:#111; color:#fff; -webkit-tap-highlight-color: transparent;}
    h1 {text-align:center; color:#0f0; margin:10px 0 20px;}
    input, textarea, button {width:100%; padding:15px; margin:10px 0; font-size:17px; border-radius:12px; box-sizing:border-box;}
    button {background:#0f0; color:#000; font-weight:bold; border:none;}
    .record {background:#222; padding:15px; margin:15px 0; border-radius:12px; word-break:break-all;}
    .clear-btn {background:#f33; margin-top:20px;}
  </style>
</head>
<body>
  <h1>🔥 SOP 股票快速記錄</h1>
  
  <label>日期時間</label>
  <input type="text" id="time" placeholder="自動填入">

  <label>本次掃描記錄（可貼多隻股票）</label>
  <textarea id="content" rows="10" placeholder="例如：
TSLA 總分 17 → No (J過熱)
MU 總分 16 → No (KDJ過熱)
NVDA 總分 12 → 觀望"></textarea>

  <button onclick="save()">💾 儲存本次掃描</button>
  <button onclick="clearAll()" class="clear-btn">🗑️ 清除所有紀錄（小心）</button>

  <h2>歷史紀錄（共 <span id="count">0</span> 筆）</h2>
  <div id="history"></div>

  <script>
    // 自動填日期
    function setTime() {
      const now = new Date();
      document.getElementById('time').value = now.toLocaleString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
    }

    function save() {
      const time = document.getElementById('time').value || new Date().toLocaleString('zh-TW');
      const content = document.getElementById('content').value.trim();
      if (!content) return alert("請輸入內容先！");
      
      const entry = { time, content };
      let records = JSON.parse(localStorage.getItem('sopRecords') || '[]');
      records.unshift(entry); // 新紀錄放最上
      localStorage.setItem('sopRecords', JSON.stringify(records));
      
      alert('✅ 已儲存！');
      document.getElementById('content').value = '';
      loadHistory();
    }

    function loadHistory() {
      const div = document.getElementById('history');
      const records = JSON.parse(localStorage.getItem('sopRecords') || '[]');
      document.getElementById('count').textContent = records.length;
      
      let html = '';
      records.forEach((r, index) => {
        html += `<div class="record">
          <strong>${r.time}</strong> 
          <button onclick="deleteOne(${index})" style="float:right; background:#f33; color:#fff; border:none; padding:5px 10px; border-radius:8px; font-size:14px;">刪除</button>
          <br><br>
          ${r.content.replace(/\n/g, '<br>')}
        </div>`;
      });
      div.innerHTML = html || '<p style="color:#888; text-align:center;">仲未有紀錄，儲存第一筆啦！</p>';
    }

    function deleteOne(index) {
      if (!confirm('確定刪除呢筆紀錄？')) return;
      let records = JSON.parse(localStorage.getItem('sopRecords') || '[]');
      records.splice(index, 1);
      localStorage.setItem('sopRecords', JSON.stringify(records));
      loadHistory();
    }

    function clearAll() {
      if (confirm('⚠️ 確定清除所有紀錄？呢個動作不能還原！')) {
        localStorage.removeItem('sopRecords');
        loadHistory();
        alert('所有紀錄已清除');
      }
    }

    // 頁面載入時自動執行
    window.onload = () => {
      setTime();
      loadHistory();
    };
  </script>
</body>
</html>
