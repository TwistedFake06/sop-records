<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 美觀卡片版 v7</title>
  <style>
    :root {
      --primary: #00ff9d;
      --bg: #0a0a0a;
      --card: #1f1f1f;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #eee;
      margin: 0;
      padding: 20px;
    }
    h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      margin: 15px 0;
      box-shadow: 0 4px 20px rgba(0, 255, 157, 0.1);
    }
    .stats {
      display: flex;
      justify-content: space-around;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 17px;
    }
    pre {
      background: #111;
      padding: 15px;
      border-radius: 10px;
      overflow: auto;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>🔥 SOP 美觀卡片版 v7</h1>

  <div class="card">
    <label>貼入 Grok 的分析文字（含表格）</label>
    <textarea id="inputText" rows="12" placeholder="直接貼 Grok 給你的整段分析..."></textarea>
    <button onclick="parseAndSave()">🤖 智能解析 + 儲存</button>
  </div>

  <div class="stats">
    <div>總掃描次數: <strong id="totalScans">0</strong></div>
    <div>平均總分: <strong id="avgScore">0</strong></div>
  </div>

  <div class="card">
    <h2>歷史卡片記錄</h2>
    <div id="history"></div>
  </div>

  <button onclick="exportAllJSON()">📤 匯出全部 JSON</button>

  <script>
    function parseAndSave() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入分析文字");

      const entry = {
        time: new Date().toLocaleString('zh-TW'),
        rawText: text,
        parsedTable: extractTable(text)
      };

      let records = JSON.parse(localStorage.getItem('sopV7') || '[]');
      records.unshift(entry);
      localStorage.setItem('sopV7', JSON.stringify(records));

      alert('✅ 已智能解析並儲存為漂亮卡片！');
      document.getElementById('inputText').value = '';
      renderHistory();
    }

    function extractTable(text) {
      // 簡單提取表格行（支援你貼的總結表格式）
      const lines = text.split('\n');
      let result = [];
      lines.forEach(line => {
        if (line.includes('**') || line.includes('|')) {
          result.push(line.trim());
        }
      });
      return result.join('\n');
    }

    function renderHistory() {
      const div = document.getElementById('history');
      const records = JSON.parse(localStorage.getItem('sopV7') || '[]');
      let html = '';
      records.forEach(r => {
        html += `
          <div class="card">
            <strong>${r.time}</strong>
            <pre>${r.parsedTable || r.rawText}</pre>
          </div>`;
      });
      div.innerHTML = html || '<p>還沒有紀錄</p>';

      // 簡單統計
      document.getElementById('totalScans').textContent = records.length;
    }

    function exportAllJSON() {
      const records = JSON.parse(localStorage.getItem('sopV7') || '[]');
      const blob = new Blob([JSON.stringify(records, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SOP-Records-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    window.onload = renderHistory;
  </script>
</body>
</html>
