<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 快速記錄</title>
  <style>
    body {font-family: system-ui; margin:0; padding:20px; background:#111; color:#fff; line-height:1.6;}
    h1 {text-align:center; color:#0f0;}
    input, textarea, button {width:100%; padding:14px; margin:10px 0; font-size:17px; border-radius:10px;}
    button {background:#0f0; color:#000; font-weight:bold;}
    .record {background:#222; padding:15px; margin:15px 0; border-radius:10px;}
    pre {background:#1a1a1a; padding:15px; border-radius:8px; overflow:auto;}
  </style>
</head>
<body>
  <h1>🔥 SOP 快速記錄 (GitHub Pages)</h1>

  <label>日期時間</label>
  <input type="text" id="time" value="" placeholder="自動填入">

  <label>本次分析記錄（可多隻股票）</label>
  <textarea id="content" rows="10" placeholder="直接輸入或貼上：
TSLA 總分 17 → No (J過熱)
MU 總分 16 → No (KDJ過熱)
AMD 總分 15 → 觀望"></textarea>

  <button onclick="saveRecord()">💾 儲存本次掃描</button>
  <button onclick="exportJSON()" style="background:#00bfff;">📤 匯出全部為 JSON</button>

  <h2>歷史掃描紀錄</h2>
  <div id="history"></div>

  <h2>最新 JSON 內容（可複製）</h2>
  <pre id="jsonPreview"></pre>

  <script>
    const STORAGE_KEY = 'sopRecords';

    function getCurrentTime() {
      return new Date().toLocaleString('zh-TW');
    }

    function saveRecord() {
      const time = document.getElementById('time').value || getCurrentTime();
      const content = document.getElementById('content').value.trim();

      if (!content) return alert("請輸入分析內容");

      let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      records.unshift({ time, content });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      
      alert('✅ 已儲存！');
      document.getElementById('content').value = '';
      loadHistory();
    }

    function loadHistory() {
      const div = document.getElementById('history');
      const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      let html = '';
      records.forEach(r => {
        html += `<div class="record">
          <strong>${r.time}</strong><br><br>
          ${r.content.replace(/\n/g, '<br>')}
        </div>`;
      });
      div.innerHTML = html || '<p>還沒有紀錄</p>';
      updateJSONPreview();
    }

    function updateJSONPreview() {
      const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      document.getElementById('jsonPreview').textContent = JSON.stringify(records, null, 2);
    }

    function exportJSON() {
      const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const dataStr = JSON.stringify(records, null, 2);
      const blob = new Blob([dataStr], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SOP-Records-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      alert('✅ JSON 已下載！');
    }

    // 自動填入時間
    window.onload = () => {
      document.getElementById('time').value = getCurrentTime();
      loadHistory();
    };
  </script>
</body>
</html>
