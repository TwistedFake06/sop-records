<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Tracker v21</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    .stock-group { margin-bottom: 32px; }
    .stock-card {
      border-left: 5px solid;
      padding: 12px 14px;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .high { border-color: #00ff9d; }
    .medium { border-color: #ffaa00; }
    .low { border-color: #888; }
    .stock-name { font-size: 18px; font-weight: bold; }
  </style>
</head>
<body class="bg-base-900 text-base-content min-h-screen p-3">
  <div class="max-w-md mx-auto">

    <h1 class="text-3xl font-bold text-center text-primary mb-6">SOP Tracker v21</h1>

    <div class="stats shadow mb-6">
      <div class="stat">
        <div class="stat-title">總掃描</div>
        <div class="stat-value text-primary" id="totalScans">0</div>
      </div>
      <div class="stat">
        <div class="stat-title">綠燈比例</div>
        <div class="stat-value text-success" id="greenRate">0%</div>
      </div>
      <div class="stat">
        <div class="stat-title">平均總分</div>
        <div class="stat-value" id="avgScore">0</div>
      </div>
    </div>

    <div class="card bg-base-800 shadow-xl mb-6">
      <div class="card-body p-4">
        <label class="label">
          <span class="label-text">貼入 Grok 的分析文字</span>
        </label>
        <textarea id="inputText" class="textarea textarea-bordered h-36 w-full bg-base-900" 
                  placeholder="直接貼 Grok 給你的整段文字..."></textarea>
        
        <div class="flex gap-3 mt-4">
          <button onclick="parseAndSplit()" class="btn btn-primary flex-1">🤖 分拆成個股卡片</button>
          <button onclick="clearInput()" class="btn btn-ghost">清空</button>
        </div>
      </div>
    </div>

    <div id="result"></div>

  </div>

  <script>
    let stockGroups = {};   // 全局存儲，按股票分組

    function getColorClass(potential) {
      if (potential.includes('高') || potential.includes('★★★')) return 'high';
      if (potential.includes('中')) return 'medium';
      return 'low';
    }

    function isGreenLight(score) {
      return parseInt(score) >= 15;
    }

    function parseAndSplit() {
      let text = document.getElementById('inputText').value.trim();
      if (!text) return alert("請貼入文字");

      const time = new Date().toLocaleString('zh-TW');
      const lines = text.split('\n');

      lines.forEach(line => {
        line = line.trim();
        if (/^\d+\s+[A-Z]+/.test(line)) {
          const parts = line.split(/\s+/).filter(p => p);
          if (parts.length >= 4) {
            const stock = parts[1];
            const change = parts[2];
            const aScore = parts[3];
            const totalScore = parts[4] || '0';
            const issue = parts.slice(5).join(' ');

            const potential = issue.includes('高') ? '★★★ 高' : 
                             (issue.includes('中') ? '★★ 中高' : '★ 低');

            const colorClass = getColorClass(potential);
            const isGreen = isGreenLight(totalScore);

            if (!stockGroups[stock]) stockGroups[stock] = [];

            stockGroups[stock].push(`
              <div class="stock-card bg-base-800 shadow-xl ${colorClass}">
                <div class="text-xs opacity-60">${time}</div>
                <div class="flex justify-between mt-1">
                  <div class="stock-name">${stock}</div>
                  <div class="text-right">
                    <div class="text-2xl font-bold text-primary">${totalScore}</div>
                  </div>
                </div>
                <div class="text-sm opacity-80 mt-2">
                  ${change} | A級: ${aScore}<br>
                  ${issue}
                </div>
                <div class="mt-3">
                  <span class="badge ${isGreen ? 'badge-success' : 'badge-neutral'}">${potential}</span>
                </div>
              </div>`);
          }
        }
      });

      // 重新渲染所有群組
      renderAllGroups();
      updateStats();
      alert('✅ 已更新個股卡片（同一股票已合併）！');
      document.getElementById('inputText').value = '';
    }

    function renderAllGroups() {
      const container = document.getElementById('result');
      let html = '';
      Object.keys(stockGroups).forEach(stock => {
        html += `
          <div class="stock-group mb-10">
            <div class="text-xl font-semibold mb-4 text-primary">${stock}</div>
            ${stockGroups[stock].join('')}
          </div>`;
      });
      container.innerHTML = html || '<p class="opacity-60 text-center">還沒有紀錄</p>';
    }

    function updateStats() {
      const cards = document.querySelectorAll('.stock-card');
      document.getElementById('totalScans').textContent = cards.length;
    }

    function clearInput() {
      document.getElementById('inputText').value = '';
    }
  </script>
</body>
</html>
